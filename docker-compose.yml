version: '3.4'

services:

  dashboard:
    image: ${DOCKER_REGISTRY-}dashboard
    build:
      context: .
      dockerfile: Dashboard/Dockerfile
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
    depends_on:
      - sql
    ports:
      - "8080:8080"

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Developer
      -  MSSQL_AGENT_ENABLED=true
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped

  jobspy:
    build:
      context: ../JobSpy
      dockerfile: Dockerfile
    environment:
      - MSSQL_SERVER=sql
      - MSSQL_PORT=1433
      - MSSQL_USER=sa
      - MSSQL_PASSWORD=${SA_PASSWORD}
      - MSSQL_DATABASE=DashboardDb
    depends_on:
      - sql
    restart: unless-stopped

volumes:
  mssql-data: